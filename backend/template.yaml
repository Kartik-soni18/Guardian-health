AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GuardianHealth — Governance-First Medical Triage Agent

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        MOCK_MODE: "false"
        DYNAMODB_TABLE: !Ref SessionsTable

Resources:

  # ── API Gateway
  GuardianHealthApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Stage
      Cors:
        AllowMethods: "'POST,GET,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key,Authorization'"
        AllowOrigin: "'https://kartik-soni18.github.io'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'https://kartik-soni18.github.io'"
              Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,Authorization'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'https://kartik-soni18.github.io'"
              Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,Authorization'"
      Auth:
        ApiKeyRequired: false  # Allow login/register without key for now

  # ── Lambda Function
  TriageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: guardian-health-triage
      PackageType: Image
      ImageUri: 403916114937.dkr.ecr.ap-southeast-2.amazonaws.com/guardian-health-backend:latest
      Description: GuardianHealth FastAPI App — Authentication, Triage, and persistence
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - CloudWatchLogsFullAccess
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref GuardianHealthApi
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            RestApiId: !Ref GuardianHealthApi
            Path: /{proxy+}
            Method: ANY

  # ── DynamoDB Table (session metadata — non-PII)
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: guardian-health-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: interaction_id
          AttributeType: S
      KeySchema:
        - AttributeName: interaction_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── CloudWatch Log Group
  TriageFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${TriageFunction}"
      RetentionInDays: 90

  # ── API Key
  GuardianApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: guardian-health-api-key
      Enabled: true

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${GuardianHealthApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
  TriageFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TriageFunction.Arn
